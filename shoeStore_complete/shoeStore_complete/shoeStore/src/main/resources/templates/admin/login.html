<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Sole &amp; Co</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--black);">

<div style="width:100%;max-width:420px;padding:2rem;">

  <!-- Logo -->
  <div style="text-align:center;margin-bottom:3rem;">
    <p style="font-family:var(--ff-display);font-size:1.6rem;font-weight:900;color:var(--white);">SOLE<span style="color:var(--gold);">&amp;</span>CO</p>
    <p style="font-family:var(--ff-mono);font-size:10px;letter-spacing:0.2em;color:var(--muted);margin-top:4px;">ADMIN ACCESS</p>
  </div>

  <div class="card" style="border-color:rgba(201,168,76,0.12);">
    <div style="display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:var(--radius);background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);margin:0 auto 1.5rem;">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="var(--gold)"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
    </div>

    <h2 style="font-family:var(--ff-display);font-size:1.4rem;color:var(--white);text-align:center;margin-bottom:0.5rem;">Admin Sign In</h2>
    <p style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:2rem;">Restricted access — authorized personnel only</p>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" name="username" placeholder="admin" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-gold btn-block btn-lg" style="margin-top:0.5rem;">Sign In to Admin</button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;">
      <a href="/" style="font-size:13px;color:var(--muted);">← Back to Store</a>
    </div>
  </div>

  <p style="text-align:center;font-size:11px;color:var(--muted);margin-top:2rem;font-family:var(--ff-mono);">
    © 2025 Sole &amp; Co · Unauthorized access is prohibited
  </p>
</div>

</body>
</html>
